# ============================================
# SimpleSST - Docker Compose (PostgreSQL only)
# ============================================
# A API roda com PM2, não com Docker
# O Nginx roda instalado no sistema
# Apenas o PostgreSQL roda em container
# ============================================

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: simplesst-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  postgres_data:

